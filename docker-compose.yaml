services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 5s
      timeout: 5s
      retries: 10

  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    depends_on:
      jaeger:
        condition: service_healthy
