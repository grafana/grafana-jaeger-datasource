apiVersion: 1

datasources:
  - name: 'jaeger'
    uid: 'jaeger'
    type: 'grafana-jaeger-datasource'
    url: 'http://jaeger:16686'
    access: proxy
    isDefault: false
    orgId: 1
    version: 1
    editable: true
    jsonData:
      path: '/resources'
    secureJsonData:
      apiKey: 'api-key'
